<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>QuickChat · 瞬聊 — 阅后即焚的聊天室</title>
<meta name="description" content="无需注册，创建房间即可开始聊天，关闭页面即销毁。" />

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: "#0A0B10",
          surface: "#12141C",
          surface2: "#181B25",
          line: "#22252F",
          ink: "#F2F3F6",
          muted: "#888D9B",
          accent: "#6C5CE7",
          accent2: "#8B7FFF",
          ember: "#FF7A59",
        },
        fontFamily: {
          display: ["'Space Grotesk'", "sans-serif"],
          body: ["'Inter'", "sans-serif"],
          mono: ["'JetBrains Mono'", "monospace"],
        },
      },
    },
  };
</script>

<style>
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 120% at 50% -10%, #171A24 0%, #0A0B10 55%);
  }
  .ember-dot {
    box-shadow: 0 0 0 0 rgba(255,122,89,0.55);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,122,89,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(255,122,89,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,122,89,0); }
  }
  .code-input {
    letter-spacing: 0.5em;
  }
  .code-input::placeholder { letter-spacing: 0.5em; }
  .btn-press:active { transform: scale(0.97); }
  @media (prefers-reduced-motion: reduce) {
    .ember-dot { animation: none; }
  }
</style>
</head>
<body class="font-body text-ink min-h-screen flex flex-col antialiased">

  <main class="flex-1 flex flex-col items-center justify-center px-6">
    <div class="w-full max-w-sm">

      <!-- Signature: ephemeral status pill -->
      <div class="flex items-center justify-center gap-2 mb-8 opacity-90">
        <span class="w-1.5 h-1.5 rounded-full bg-ember ember-dot"></span>
        <span class="font-mono text-[11px] tracking-[0.2em] text-muted uppercase">阅后即焚 · 无痕聊天</span>
      </div>

      <!-- Title -->
      <div class="text-center mb-12">
        <h1 class="font-display font-semibold text-5xl tracking-tight text-ink">
          Quick<span class="text-accent2">Chat</span>
        </h1>
        <p class="mt-3 text-muted text-sm">不注册、不留痕。关闭页面，聊天即结束。</p>
      </div>

      <!-- Create room -->
      <button id="createBtn" class="btn-press w-full bg-accent hover:bg-accent2 transition-colors duration-150 text-white font-medium text-base rounded-2xl py-4 shadow-lg shadow-accent/20 flex items-center justify-center gap-2">
        <svg id="createIcon" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span id="createLabel">创建新聊天</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-8">
        <div class="h-px flex-1 bg-line"></div>
        <span class="text-xs text-muted font-mono">或</span>
        <div class="h-px flex-1 bg-line"></div>
      </div>

      <!-- Join room -->
      <form id="joinForm" class="space-y-3">
        <input
          id="roomInput"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="5"
          placeholder="00000"
          autocomplete="off"
          class="code-input w-full bg-surface border border-line focus:border-accent2 outline-none text-center font-mono text-2xl text-ink rounded-2xl py-4 px-4 transition-colors placeholder:text-line"
        />
        <button type="submit" class="btn-press w-full bg-surface2 hover:bg-line border border-line transition-colors duration-150 text-ink font-medium text-base rounded-2xl py-3.5">
          加入聊天
        </button>
      </form>

      <p id="errorMsg" class="hidden text-center text-sm text-ember mt-4"></p>

    </div>
  </main>

  <footer class="pb-6 text-center">
    <p class="text-[11px] text-muted/70 font-mono">房间信息仅保存在内存中 · 无历史记录</p>
  </footer>

<script>
  const createBtn = document.getElementById("createBtn");
  const createLabel = document.getElementById("createLabel");
  const createIcon = document.getElementById("createIcon");
  const joinForm = document.getElementById("joinForm");
  const roomInput = document.getElementById("roomInput");
  const errorMsg = document.getElementById("errorMsg");

  // 只允许输入数字，自动格式化为5位
  roomInput.addEventListener("input", () => {
    roomInput.value = roomInput.value.replace(/\D/g, "").slice(0, 5);
    errorMsg.classList.add("hidden");
  });

  createBtn.addEventListener("click", async () => {
    createBtn.disabled = true;
    createLabel.textContent = "创建中...";
    createIcon.classList.add("animate-spin");
    try {
      const res = await fetch("/api/create-room");
      const data = await res.json();
      window.location.href = `/chat/${data.roomCode}`;
    } catch (e) {
      createLabel.textContent = "创建失败，请重试";
      createBtn.disabled = false;
      createIcon.classList.remove("animate-spin");
    }
  });

  joinForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const code = roomInput.value.trim();
    if (code.length !== 5) {
      errorMsg.textContent = "请输入完整的5位房间号";
      errorMsg.classList.remove("hidden");
      return;
    }
    window.location.href = `/chat/${code}`;
  });
</script>
</body>
</html>
