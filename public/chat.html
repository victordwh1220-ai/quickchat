<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<title>QuickChat · Chat Room</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: "#0A0B10",
          surface: "#12141C",
          surface2: "#181B25",
          line: "#22252F",
          ink: "#F2F3F6",
          muted: "#888D9B",
          accent: "#6C5CE7",
          accent2: "#8B7FFF",
          ember: "#FF7A59",
          bubbleOther: "#1E222C",
        },
        fontFamily: {
          display: ["'Space Grotesk'", "sans-serif"],
          body: ["'Inter'", "sans-serif"],
          mono: ["'JetBrains Mono'", "monospace"],
        },
      },
    },
  };
</script>

<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: #0A0B10; }

  #messages { scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: #22252F; border-radius: 999px; }

  .bubble-mine {
    background: linear-gradient(135deg, #6C5CE7, #7A6BF0);
    border-bottom-right-radius: 6px;
  }
  .bubble-other {
    background: #1E222C;
    border-bottom-left-radius: 6px;
  }
  .fade-in { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ember-dot {
    box-shadow: 0 0 0 0 rgba(255,122,89,0.55);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,122,89,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(255,122,89,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,122,89,0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ember-dot { animation: none; }
    .fade-in { animation: none; }
  }
  .btn-press:active { transform: scale(0.97); }
  .chat-image {
    max-width: 240px;
    max-height: 320px;
    border-radius: 14px;
    display: block;
    cursor: zoom-in;
    object-fit: cover;
  }
  /* Fullscreen image viewer */
  #imageViewer { background: rgba(6,7,10,0.92); }
</style>
</head>
<body class="font-body text-ink h-screen flex flex-col">

  <!-- Name entry modal (shown before joining; name is never saved after leaving) -->
  <div id="nameModal" class="fixed inset-0 z-50 flex items-center justify-center px-6 bg-bg/95 backdrop-blur">
    <div class="w-full max-w-sm bg-surface border border-line rounded-3xl p-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-1.5 h-1.5 rounded-full bg-ember ember-dot"></span>
        <p class="text-[11px] uppercase tracking-[0.2em] text-muted font-mono">Room <span id="modalRoomCode">------</span></p>
      </div>
      <h2 class="font-display font-semibold text-2xl mb-2">What's your name?</h2>
      <p class="text-muted text-sm mb-5">Only shown to people in this room. Not saved anywhere after you leave.</p>
      <form id="nameForm" class="space-y-3">
        <input
          id="nameInput"
          type="text"
          maxlength="20"
          placeholder="Your name"
          autocomplete="off"
          class="w-full bg-surface2 border border-line focus:border-accent2 outline-none text-ink text-base rounded-2xl px-4 py-3.5 placeholder:text-muted transition-colors"
        />
        <button type="submit" class="btn-press w-full bg-accent hover:bg-accent2 transition-colors duration-150 text-white font-medium text-base rounded-2xl py-3.5">
          Join chat
        </button>
      </form>
    </div>
  </div>

  <!-- Top bar -->
  <header class="flex items-center justify-between px-5 py-4 border-b border-line bg-surface/70 backdrop-blur">
    <div class="flex items-center gap-2.5">
      <span class="w-1.5 h-1.5 rounded-full bg-ember ember-dot"></span>
      <div>
        <p class="text-[10px] uppercase tracking-[0.2em] text-muted font-mono leading-none mb-1">Room</p>
        <p id="roomCodeLabel" class="font-display font-semibold text-xl tracking-wide leading-none">------</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="onlineCount" class="hidden sm:inline text-xs text-muted font-mono mr-1">1 online</span>
      <button id="callBtn" aria-label="Start voice call" class="w-10 h-10 rounded-full bg-surface2 hover:bg-line border border-line transition-colors flex items-center justify-center">
        <svg class="w-[18px] h-[18px] text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.36 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.34 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button id="exitBtn" class="text-sm text-muted hover:text-ember transition-colors px-3 py-2 rounded-xl hover:bg-surface2">
        Leave
      </button>
    </div>
  </header>

  <!-- Active call bar -->
  <div id="callBar" class="hidden items-center justify-between gap-3 px-5 py-3 bg-accent/10 border-b border-accent/30">
    <div class="flex items-center gap-2 min-w-0">
      <span class="w-2 h-2 rounded-full bg-accent2 animate-pulse shrink-0"></span>
      <p class="text-sm text-ink font-medium truncate">Voice call · <span id="callCount">1</span> in call</p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <button id="muteBtn" aria-label="Mute" class="w-9 h-9 rounded-full bg-surface2 hover:bg-line border border-line transition-colors flex items-center justify-center">
        <svg id="muteIcon" class="w-4 h-4 text-ink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
      </button>
      <button id="leaveCallBtn" aria-label="Leave call" class="px-4 h-9 rounded-full bg-ember hover:bg-ember/80 transition-colors text-white text-sm font-medium">
        Leave call
      </button>
    </div>
  </div>

  <!-- Hidden container for remote call audio streams -->
  <div id="remoteAudios" class="hidden"></div>

  <!-- Messages -->
  <main id="messages" class="flex-1 overflow-y-auto px-4 py-5 space-y-3"></main>

  <!-- Image preview (before send) -->
  <div id="imagePreviewBar" class="hidden px-4 pt-3 border-t border-line bg-surface/70">
    <div class="relative inline-block">
      <img id="imagePreviewThumb" class="h-20 w-20 object-cover rounded-xl border border-line" />
      <button id="removeImageBtn" aria-label="Remove image" class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-ember text-white flex items-center justify-center text-xs shadow">
        ✕
      </button>
    </div>
  </div>

  <!-- Input bar -->
  <footer class="border-t border-line bg-surface/70 backdrop-blur px-4 py-3 pb-[calc(env(safe-area-inset-bottom)+0.75rem)]">
    <form id="messageForm" class="flex items-end gap-2">
      <input id="imageInput" type="file" accept="image/*" class="hidden" />
      <button type="button" id="attachBtn" aria-label="Attach image" class="shrink-0 w-11 h-11 rounded-full bg-surface2 hover:bg-line border border-line transition-colors flex items-center justify-center">
        <svg class="w-5 h-5 text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <textarea
        id="messageInput"
        rows="1"
        placeholder="Message..."
        autocomplete="off"
        class="flex-1 resize-none bg-surface2 border border-line focus:border-accent2 outline-none text-ink text-[15px] rounded-2xl px-4 py-3 max-h-32 placeholder:text-muted transition-colors"
      ></textarea>
      <button type="submit" id="sendBtn" aria-label="Send" class="shrink-0 w-11 h-11 rounded-full bg-accent hover:bg-accent2 active:scale-95 transition-all flex items-center justify-center disabled:opacity-40 disabled:pointer-events-none">
        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
      </button>
    </form>
  </footer>

  <!-- Room-not-found overlay -->
  <div id="notFoundOverlay" class="hidden fixed inset-0 bg-bg/95 backdrop-blur flex flex-col items-center justify-center px-6 text-center z-50">
    <div class="w-14 h-14 rounded-2xl bg-surface2 border border-line flex items-center justify-center mb-5">
      <svg class="w-6 h-6 text-ember" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
    </div>
    <h2 class="font-display font-semibold text-2xl mb-2">Room not found or has ended</h2>
    <p class="text-muted text-sm mb-8 max-w-xs">This room may have been closed, or the room code is incorrect.</p>
    <a href="/" class="bg-accent hover:bg-accent2 transition-colors text-white font-medium text-sm rounded-2xl px-6 py-3">
      Back to home
    </a>
  </div>

  <!-- Fullscreen image viewer -->
  <div id="imageViewer" class="hidden fixed inset-0 z-50 items-center justify-center px-6 cursor-zoom-out">
    <img id="imageViewerImg" class="max-w-full max-h-full rounded-xl" />
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
